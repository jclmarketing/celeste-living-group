  <line x1="175" y1="223" x2="205" y2="223" stroke="#1B4332" stroke-width="2"/>
  <!-- Inner V -->
  <path d="M165 290 L200 330 L235 290" stroke="#95D5B2" stroke-width="6" fill="none" stroke-linejoin="round" opacity="0.65"/>
