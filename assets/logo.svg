  <!-- LIVING GROUP -->
  <text x="200" y="452" font-family="'Cormorant Garamond', Georgia, serif" font-size="22" font-weight="400" text-anchor="middle" fill="#1B4332" letter-spacing="7">LIVING GROUP</text>
</svg>
